ontent" id="VPContent" data-v-6b5fd0a9 data-v-a4c57a06><div class="VPDoc" data-v-a4c57a06 data-v-79ca2460><div class="container" data-v-79ca2460><div class="aside" data-v-79ca2460><div class="aside-curtain" data-v-79ca2460></div><div class="aside-container" data-v-79ca2460><div class="aside-content" data-v-79ca2460><div class="VPDocAside" data-v-79ca2460 data-v-779d834d><!--[--><!--]--><!--[--><!--]--><!----><!--[--><!--]--><div class="spacer" data-v-779d834d></div><!--[--><!--]--><!----><!--[--><!--]--><!--[--><!--]--></div></div></div></div><div class="content" data-v-79ca2460><div class="content-container" data-v-79ca2460><!--[--><!--]--><main class="main" data-v-79ca2460><div style="position:relative;" class="vp-doc _1" data-v-79ca2460><div><h1 id="人的精力是有限的" tabindex="-1">人的精力是有限的 <a class="header-anchor" href="#人的精力是有限的" aria-hidden="true">#</a></h1><p>微信小程序雨林留言板将会关闭，为什么呢？因为小程序云开发开始收费了。</p><p>每个人的精力都是有限的，我们必须在有限的时间内去做让自己得到最大进步的东西。</p><p>如果我去研究云开发，那么目前我会花费更多的钱还有精力，却与目前最重要的事情——掌握工作技能不在同一个目标上。</p><div class="warning custom-block"><p class="custom-block-title">WARNING</p><p>你开挂要讲个限度</p></div><p>我想要的只是一个不受微信管控的评论，既然这样，我可以使用 GitHub 的 issue 作为评论的原始材料</p><div id="comment"></div></div></div></main><footer class="VPDocFooter" data-v-79ca2460 data-v-04568844><div class="edit-info" data-v-04568844><!----><!----></div><!----></footer><!--[--><!--]--></div></div></div></div></div><!----><!--[--><!--]--></div></div>
